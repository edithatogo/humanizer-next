name: Skill distribution validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-skill:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize line endings (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git reset --hard HEAD

      - name: Setup Node
        uses: ./.github/actions/setup-maintainer-env
        with:
          node-version: '20'
          install-vale: 'true'
          npm-ci: 'true'

      - name: Sync generated outputs
        run: npm run sync

      - name: Lint, Typecheck and Format
        if: runner.os != 'Windows'
        run: |
          npm run lint:all

      - name: Lint and Typecheck (Windows)
        if: runner.os == 'Windows'
        run: |
          npm run lint
          npm run vale
          npm run lint:js
          npm run typecheck

      - name: Validate repository docs and adapters
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Verify generated outputs are committed
        run: npm run check:sync

      - name: Run skill validation script
        shell: bash
        run: |
          chmod +x scripts/validate-skill.sh
          ./scripts/validate-skill.sh
