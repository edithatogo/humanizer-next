name: Skill distribution validation

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-skill:
    env:
      VALE_VERSION: 3.13.0
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize line endings (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git reset --hard HEAD

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Vale (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          curl -sSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -o vale.tar.gz
          tar -xzf vale.tar.gz
          sudo mv vale /usr/local/bin/vale

      - name: Install Vale (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -sSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_macOS_64-bit.tar.gz" -o vale.tar.gz
          tar -xzf vale.tar.gz
          sudo mv vale /usr/local/bin/vale

      - name: Install Vale (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP "vale.zip"
          $extractDir = Join-Path $env:RUNNER_TEMP "vale"
          Invoke-WebRequest "https://github.com/errata-ai/vale/releases/download/v$env:VALE_VERSION/vale_$env:VALE_VERSION_Windows_64-bit.zip" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force
          "$extractDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sync generated outputs
        run: npm run sync

      - name: Lint, Typecheck and Format
        if: runner.os != 'Windows'
        run: |
          npm run lint:all

      - name: Lint and Typecheck (Windows)
        if: runner.os == 'Windows'
        run: |
          npm run lint
          npm run vale
          npm run lint:js
          npm run typecheck

      - name: Validate repository docs and adapters
        run: npm run validate

      - name: Run tests
        run: npm test

      - name: Verify generated outputs are committed
        run: npm run check:sync

      - name: Run skill validation script
        shell: bash
        run: |
          chmod +x scripts/validate-skill.sh
          ./scripts/validate-skill.sh
