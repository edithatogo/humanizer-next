name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up shared maintainer toolchain
        uses: ./.github/actions/setup-maintainer-env
        with:
          node-version: '20'
          python-version: '3.13'
          install-python-test-deps: 'true'
          install-vale: 'true'
          npm-ci: 'true'

      - name: Sync generated outputs
        run: npm run sync

      - name: Run maintainer validation
        run: npm run lint:all && npm run validate

      - name: Run Node tests
        run: npm test

      - name: Run Python tests
        run: pytest

      - name: Verify sync outputs
        run: npm run check:sync
