name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build skill artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Set up shared maintainer toolchain
        uses: ./.github/actions/setup-maintainer-env
        with:
          node-version: '20'
          install-vale: 'true'
          npm-ci: 'true'

      - name: Sync generated outputs
        run: npm run sync

      - name: Build and validate artifacts
        run: |
          npm run lint:all
          npm test
          npm run validate
          npm run check:sync

      - name: Package release artifacts
        run: |
          mkdir -p release-artifacts
          cp SKILL.md release-artifacts/
          cp SKILL_PROFESSIONAL.md release-artifacts/
          cp README.md release-artifacts/
          cp AGENTS.md release-artifacts/
          cp docs/install-matrix.md release-artifacts/
          cp docs/skill-distribution.md release-artifacts/
          cp -R adapters release-artifacts/adapters
          tar -czf humanizer-next-skill-artifacts.tar.gz -C release-artifacts .
          (cd release-artifacts && zip -r ../humanizer-next-skill-artifacts.zip .)

      - name: Verify packaged artifact surface
        run: |
          test -f humanizer-next-skill-artifacts.tar.gz
          test -f humanizer-next-skill-artifacts.zip
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^SKILL\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^SKILL_PROFESSIONAL\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^README\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^AGENTS\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^docs/install-matrix\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^docs/skill-distribution\.md$'
          tar -tzf humanizer-next-skill-artifacts.tar.gz | grep -E '^adapters/'

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: humanizer-next-skill-artifacts
          path: |
            release-artifacts
            humanizer-next-skill-artifacts.tar.gz
            humanizer-next-skill-artifacts.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            humanizer-next-skill-artifacts.tar.gz
            humanizer-next-skill-artifacts.zip
