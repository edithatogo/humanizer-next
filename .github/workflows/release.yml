name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Build skill artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build and validate artifacts
        run: |
          npm run lint:all
          npm test
          npm run validate
          npm run check:sync

      - name: Package release artifacts
        run: |
          mkdir -p release-artifacts
          cp SKILL.md release-artifacts/
          cp SKILL_PROFESSIONAL.md release-artifacts/
          cp README.md release-artifacts/
          cp AGENTS.md release-artifacts/
          cp -R adapters release-artifacts/adapters

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: humanizer-next-skill-artifacts
          path: release-artifacts

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**
