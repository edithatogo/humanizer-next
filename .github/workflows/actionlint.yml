name: Workflow lint

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - '.github/actions/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/*.yml'
      - '.github/actions/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint workflows
        uses: reviewdog/action-actionlint@v1
