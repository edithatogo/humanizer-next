name: Weekly Self-Improvement

on:
  schedule:
    # Every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  self-improvement:
    name: Self-Improvement Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up shared maintainer toolchain
        uses: ./.github/actions/setup-maintainer-env
        with:
          node-version: '20'
          install-vale: 'false'
          npm-ci: 'true'

      - name: Capture run date
        id: run_date
        shell: bash
        run: echo "value=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Gather Baseline Metrics
        run: |
          {
            echo "=== Baseline Metrics ==="
            echo "Date: $(date)"
            echo ""
            echo "File Sizes:"
            wc -l SKILL.md SKILL_PROFESSIONAL.md QWEN.md
            echo ""
            echo "AI Pattern Count in Skill:"
            grep -c -i "stands as\|testament to\|crucial\|pivotal\|vibrant\|showcasing" SKILL.md SKILL_PROFESSIONAL.md QWEN.md || echo "0"
          } | tee metrics-baseline.txt

      - name: Pattern Drift Detection
        run: |
          echo "=== Pattern Drift Detection ==="
          echo "Checking for new AI patterns that may need addition to skill..."
          echo ""
          # Common 2025-2026 AI tells to monitor
          NEW_TELLS="intricate|commendable|meticulous|profoundly|deliberately|thoughtfully crafted"
          DRIFT_COUNT=$(grep -ci -E "$NEW_TELLS" SKILL.md | head -5)
          if [ "$DRIFT_COUNT" -gt 0 ]; then
            echo "::warning::Potential pattern drift detected: Found $DRIFT_COUNT instances of emerging AI vocabulary"
            echo "Consider reviewing if these should be added as patterns"
          else
            echo "No pattern drift detected - skill is current"
          fi

      - name: Gather repository intelligence and decision support
        run: |
          node scripts/gather-repo-data.js edithatogo/humanizer-next blader/humanizer
          node scripts/render-self-improvement-issue.js

      - name: Run Validation
        run: |
          npm run validate
          npm test

      - name: Upload Baseline Metrics
        uses: actions/upload-artifact@v7
        with:
          name: baseline-metrics
          path: metrics-baseline.txt

      - name: Upload self-improvement data
        uses: actions/upload-artifact@v7
        with:
          name: self-improvement-data
          path: |
            conductor/tracks/repo-self-improvement_20260303/repo-data.json
            conductor/tracks/repo-self-improvement_20260303/upstream-decision-log.md
            .github/generated/self-improvement-issue.md
            .github/generated/self-improvement-decisions.md
            .github/generated/self-improvement-pr-body.md

      - name: Capture generated draft PR body
        id: pr_body
        shell: bash
        run: |
          {
            echo 'body<<EOF'
            cat .github/generated/self-improvement-pr-body.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create or update decision record draft PR
        id: decision_pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/self-improvement-decision-record
          delete-branch: true
          title: 'chore: refresh self-improvement decision record'
          commit-message: 'chore: refresh self-improvement decision record'
          body: ${{ steps.pr_body.outputs.body }}
          labels: |
            self-improvement
            weekly-cycle
            automated
          draft: true
          add-paths: |
            conductor/tracks/repo-self-improvement_20260303/upstream-decision-log.md

      - name: Create Analysis Issue
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Self-Improvement Cycle ${{ steps.run_date.outputs.value }}
          content-filepath: .github/generated/self-improvement-issue.md
          labels: |
            self-improvement
            weekly-cycle
            automated

      - name: Output Instructions
        run: |
          echo "::notice::Self-improvement cycle initiated. See issue created above for detailed analysis tasks and Adopt/Reject/Defer suggestions."
          echo "::notice::Draft PR number: ${{ steps.decision_pr.outputs.pull-request-number }}"
          echo "::notice::The track-owned decision record at conductor/tracks/repo-self-improvement_20260303/upstream-decision-log.md has been refreshed from live data."
          echo "::notice::Generated issue body, decision logs, and repo-data.json are attached as workflow artifacts."
